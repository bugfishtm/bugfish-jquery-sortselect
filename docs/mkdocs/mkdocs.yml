site_name: jQuery Sortselect
repo_url: https://github.com/bugfishtm/bugfish-jquery-sortselect
repo_name: bugfishtm/bugfish-jquery-sortselect

nav:
  - Home: index.md
  - Demo: demo.md
  - Support: support.md
  - License: license.md
  - Impressum: https://bugfishtm.blogspot.com/2023/05/impressum.html
  - Privacy: https://bugfishtm.blogspot.com/2023/05/privacy.html
  - More by Bugfish: https://bugfishtm.github.io
 
theme:
  name: material
  logo: ./logo.png
  favicon: ./favicon.ico
  primary: deep orange
  language: 'en'
  accent: deep orange
  font: false
  palette:
    - scheme: slate
      primary: deep orange
      accent: deep orange

extra_css:
  - stylesheets/extra.css
  - stylesheets/jquery.multiselect.sortable.js.css

extra_javascript:
  - javascripts/jq.3.6.min.js
  - javascripts/jquery-ui.min.js
  - javascripts/jquery.multiselect.sortable.js
  - javascripts/extra.js

plugins:
    - mkdocstrings
    - search
    - mkdocs-video
    - meta-descriptions:
       export_csv: false
       quiet: false
       enable_checks: false
       min_length: 50
       max_length: 160
       trim: false
    
markdown_extensions:
  - attr_list
  
use_directory_urls: false

extra:
  meta:
    author: "Jan-Maurice Dahlmanns"